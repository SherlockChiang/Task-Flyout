name: Beta Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: task-flyout-master-release
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  PLATFORM: x64
  PROJECT_FILE: Task_Flyout.csproj
  TEST_PROJECT_FILE: Tests\Task_Flyout.Tests\Task_Flyout.Tests.csproj

jobs:
  verify:
    name: Restore and test
    if: github.ref == 'refs/heads/master'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        # v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up .NET SDK
        # v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT_FILE --locked-mode

      - name: Run tests
        shell: pwsh
        run: dotnet test $env:TEST_PROJECT_FILE -c Release --no-restore

  package:
    name: Build unsigned package
    needs: verify
    runs-on: windows-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      beta_tag: ${{ steps.version.outputs.beta_tag }}
      short_sha: ${{ steps.version.outputs.short_sha }}

    steps:
      - name: Check out repository
        # v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up .NET SDK
        # v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Set up MSBuild
        # v2.0.0
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Prepare OAuth build input
        shell: pwsh
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.TASK_FLYOUT_GOOGLE_CREDENTIALS_JSON }}
          MICROSOFT_CLIENT_ID: ${{ secrets.TASK_FLYOUT_MICROSOFT_CLIENT_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_CREDENTIALS_JSON)) {
            throw "Missing secret: TASK_FLYOUT_GOOGLE_CREDENTIALS_JSON"
          }
          if ([string]::IsNullOrWhiteSpace($env:MICROSOFT_CLIENT_ID)) {
            throw "Missing secret: TASK_FLYOUT_MICROSOFT_CLIENT_ID"
          }

          [System.IO.File]::WriteAllText(
            (Join-Path $env:GITHUB_WORKSPACE "credentials.json"),
            $env:GOOGLE_CREDENTIALS_JSON)
          [System.IO.File]::WriteAllText(
            (Join-Path $env:GITHUB_WORKSPACE "Secrets.cs"),
            "namespace Task_Flyout.Services; internal static class Secrets { internal const string MicrosoftClientId = `"$env:MICROSOFT_CLIENT_ID`"; }")

      - name: Compute beta version
        id: version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content -LiteralPath "Package.appxmanifest"
          [version]$baseVersion = $manifest.Package.Identity.Version
          $revision = [int]$env:GITHUB_RUN_NUMBER
          if ($revision -gt 65535) {
            throw "GITHUB_RUN_NUMBER exceeds the MSIX version component limit."
          }

          $version = "$($baseVersion.Major).$($baseVersion.Minor).$($baseVersion.Build).$revision"
          $manifest.Package.Identity.Version = $version
          $manifest.Save((Join-Path $env:GITHUB_WORKSPACE "Package.appxmanifest"))
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "beta-v$version-$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT"

          "package_version=$version" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "beta_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore application dependencies
        shell: pwsh
        run: dotnet restore $env:PROJECT_FILE --locked-mode

      - name: Build unsigned MSIX package
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "unsigned-package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          msbuild $env:PROJECT_FILE `
            /m `
            /p:RestoreLockedMode=true `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxBundle=Never `
            /p:AppxPackageDir="$packageDir\" `
            /p:AppxPackageSigningEnabled=false

          $packages = @(Get-ChildItem -LiteralPath $packageDir -Recurse -File -Filter "*.msix")
          if ($packages.Count -eq 0) {
            throw "No unsigned MSIX package was produced."
          }

      - name: Remove OAuth build input
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "credentials.json") -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "Secrets.cs") -Force -ErrorAction SilentlyContinue

      - name: Upload unsigned package
        # v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: TaskFlyout-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          path: unsigned-package/**/*.msix
          if-no-files-found: error
          retention-days: 1

  release:
    name: Sign and publish beta
    needs: package
    runs-on: windows-latest
    timeout-minutes: 15
    environment: beta-release
    permissions:
      contents: write

    steps:
      - name: Check out release history
        # v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download unsigned package
        # v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: TaskFlyout-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          path: unsigned-package

      - name: Sign MSIX package
        timeout-minutes: 5
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.TASK_FLYOUT_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.TASK_FLYOUT_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64)) {
            throw "Missing secret: TASK_FLYOUT_CERTIFICATE_BASE64"
          }
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            throw "Missing secret: TASK_FLYOUT_CERTIFICATE_PASSWORD"
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "task-flyout-signing.pfx"
          [System.IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:CERTIFICATE_BASE64))

          try {
            $certificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $certificatePath,
              $env:CERTIFICATE_PASSWORD,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet)
            [xml]$manifest = Get-Content -LiteralPath "Package.appxmanifest"
            $publisher = $manifest.Package.Identity.Publisher
            if ($certificate.Subject -ne $publisher) {
              throw "Signing certificate subject '$($certificate.Subject)' does not match manifest publisher '$publisher'."
            }
            if ($certificate.NotBefore -gt (Get-Date) -or $certificate.NotAfter -le (Get-Date)) {
              throw "The signing certificate is not currently valid."
            }
            $certificatePathPublic = Join-Path $env:GITHUB_WORKSPACE "unsigned-package\TaskFlyout.cer"
            [System.IO.File]::WriteAllBytes(
              $certificatePathPublic,
              $certificate.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
            Write-Host "Trusting the signing certificate for verification."
            Import-Certificate -FilePath $certificatePathPublic -CertStoreLocation Cert:\CurrentUser\TrustedPeople | Out-Null

            Write-Host "Locating the Windows SDK signing tool."
            $signTool = Get-ChildItem -LiteralPath "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { Get-Item -LiteralPath (Join-Path $_.FullName "x64\signtool.exe") -ErrorAction SilentlyContinue } |
              Select-Object -First 1
            if ($null -eq $signTool) {
              throw "Windows SDK signtool.exe was not found."
            }

            $packages = @(Get-ChildItem -LiteralPath "unsigned-package" -Recurse -File -Filter "Task_Flyout*.msix")
            if ($packages.Count -eq 0) {
              throw "No unsigned MSIX package was downloaded."
            }

            foreach ($package in $packages) {
              Write-Host "Signing $($package.Name)."
              & $signTool.FullName sign /fd SHA256 /f $certificatePath /p $env:CERTIFICATE_PASSWORD $package.FullName
              if ($LASTEXITCODE -ne 0) {
                throw "Signing failed for $($package.Name)."
              }

              Write-Host "Verifying $($package.Name)."
              & $signTool.FullName verify /pa /v $package.FullName
              if ($LASTEXITCODE -ne 0) {
                throw "Signature verification failed for $($package.Name)."
              }
            }
          }
          finally {
            if ($null -ne $certificate) {
              Remove-Item -LiteralPath "Cert:\CurrentUser\TrustedPeople\$($certificate.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
          }

      - name: Collect release assets
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.package.outputs.package_version }}
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "release-artifacts"
          $stagingDir = Join-Path $artifactDir "TaskFlyout-beta-$env:PACKAGE_VERSION-$env:GITHUB_RUN_NUMBER"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          Get-ChildItem -LiteralPath "unsigned-package" -Recurse -File -Filter "Task_Flyout*.msix" |
            Copy-Item -Destination $stagingDir -Force
          Copy-Item -LiteralPath "unsigned-package\TaskFlyout.cer" -Destination $stagingDir -Force
          $x64Dependencies = @(Get-ChildItem -LiteralPath "unsigned-package" -Recurse -File -Filter "Microsoft.WindowsAppRuntime*.msix" |
            Where-Object FullName -match "[\\/]Dependencies[\\/]x64[\\/]")
          if ($x64Dependencies.Count -gt 0) {
            $dependencyDir = Join-Path $stagingDir "Dependencies\x64"
            New-Item -ItemType Directory -Force -Path $dependencyDir | Out-Null
            $x64Dependencies | Copy-Item -Destination $dependencyDir -Force
          }

          @'
          $ErrorActionPreference = "Stop"
          $root = Split-Path -Parent $MyInvocation.MyCommand.Path
          $certificate = Join-Path $root "TaskFlyout.cer"
          $package = Get-ChildItem -LiteralPath $root -File -Filter "*.msix" | Select-Object -First 1
          if ($null -eq $package) { throw "Task Flyout MSIX was not found." }
          $dependencies = @(Get-ChildItem -LiteralPath (Join-Path $root "Dependencies\x64") -File -Filter "*.msix" -ErrorAction SilentlyContinue)
          $process = Start-Process certutil.exe -ArgumentList @("-f", "-addstore", "TrustedPeople", "`"$certificate`"") -Verb RunAs -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "The Task Flyout signing certificate was not trusted." }
          Get-Process -Name "Task_Flyout" -ErrorAction SilentlyContinue | Stop-Process -Force
          if ($dependencies.Count -gt 0) {
            Add-AppxPackage -Path $package.FullName -DependencyPath $dependencies.FullName -ForceUpdateFromAnyVersion
          }
          else {
            Add-AppxPackage -Path $package.FullName -ForceUpdateFromAnyVersion
          }
          Write-Host "Task Flyout installed successfully." -ForegroundColor Green
          '@ | Set-Content -LiteralPath (Join-Path $stagingDir "Install.ps1") -Encoding UTF8

          $zipPath = Join-Path $artifactDir "TaskFlyout-beta-$env:PACKAGE_VERSION-$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT-win-x64.zip"
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $zipPath -Force

      - name: Generate commit release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.package.outputs.package_version }}
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "release-artifacts"
          $notesPath = Join-Path $artifactDir "release-notes.md"
          $previousTag = gh release list --repo $env:GITHUB_REPOSITORY --limit 1 --json tagName --jq ".[0].tagName"

          if (-not [string]::IsNullOrWhiteSpace($previousTag)) {
            git merge-base --is-ancestor $previousTag $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) {
              throw "Previous release tag '$previousTag' is not an ancestor of $env:GITHUB_SHA."
            }
            $range = "$previousTag..$env:GITHUB_SHA"
            $rangeText = "Changes since [$previousTag](https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$previousTag)"
            $compareUrl = "https://github.com/$env:GITHUB_REPOSITORY/compare/$previousTag...$env:GITHUB_SHA"
          }
          else {
            $range = $env:GITHUB_SHA
            $rangeText = "Initial automated release history"
            $compareUrl = "https://github.com/$env:GITHUB_REPOSITORY/commits/$env:GITHUB_SHA"
          }

          $commits = @(git log $range --reverse --pretty=format:"- %s ([%h](https://github.com/$env:GITHUB_REPOSITORY/commit/%H))")
          if ($commits.Count -eq 0) {
            throw "No commits were found for release range '$range'."
          }

          @(
            "Automated Task Flyout beta release.",
            "",
            "- Package version: ``$env:PACKAGE_VERSION``",
            "- Commit: ``$env:GITHUB_SHA``",
            "- Build: ``$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT``",
            "- Platform: ``win-x64``",
            "",
            "## Updates",
            "",
            $rangeText,
            "",
            $commits,
            "",
            "**[Full comparison]($compareUrl)**"
          ) | Set-Content -LiteralPath $notesPath -Encoding UTF8

      - name: Create GitHub beta release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BETA_TAG: ${{ needs.package.outputs.beta_tag }}
          PACKAGE_VERSION: ${{ needs.package.outputs.package_version }}
          SHORT_SHA: ${{ needs.package.outputs.short_sha }}
        run: |
          gh release create $env:BETA_TAG `
            "release-artifacts\TaskFlyout-beta-$env:PACKAGE_VERSION-$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT-win-x64.zip" `
            --title "Task Flyout Beta $env:PACKAGE_VERSION ($env:SHORT_SHA)" `
            --notes-file "release-artifacts\release-notes.md" `
            --target "$env:GITHUB_SHA" `
            --prerelease
