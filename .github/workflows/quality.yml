name: Quality

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  workflow_run:
    workflows:
      - Beta Release
    types:
      - completed

permissions:
  contents: read

jobs:
  unit:
    name: Unit, localization, and policy tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore "Tests\Task_Flyout.Tests\Task_Flyout.Tests.csproj" --locked-mode
      - name: Run tests
        shell: pwsh
        run: dotnet test "Tests\Task_Flyout.Tests\Task_Flyout.Tests.csproj" -c Release --no-restore

  packaged:
    name: Packaged smoke and soak
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out tested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download matching beta release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_SHA: ${{ github.event.workflow_run.head_sha || '' }}
        run: |
          $releases = gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=20" | ConvertFrom-Json
          $release = if ([string]::IsNullOrWhiteSpace($env:TEST_SHA)) {
            $releases | Where-Object prerelease | Select-Object -First 1
          }
          else {
            $releases | Where-Object { $_.prerelease -and $_.target_commitish -eq $env:TEST_SHA } | Select-Object -First 1
          }
          if ($null -eq $release) { throw "A matching beta release was not found." }
          $asset = $release.assets | Where-Object name -Like "*-win-x64.zip" | Select-Object -First 1
          if ($null -eq $asset) { throw "The beta release has no x64 zip asset." }
          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\release" -Force | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:RUNNER_TEMP\release\beta.zip"
          Expand-Archive -LiteralPath "$env:RUNNER_TEMP\release\beta.zip" -DestinationPath "$env:RUNNER_TEMP\release\expanded" -Force

      - name: Register package for UI testing
        shell: pwsh
        run: |
          $msix = Get-ChildItem -LiteralPath "$env:RUNNER_TEMP\release\expanded" -Recurse -File -Filter "Task_Flyout*.msix" | Select-Object -First 1
          if ($null -eq $msix) { throw "Task Flyout MSIX was not found." }
          $dependency = Get-ChildItem -LiteralPath "$env:RUNNER_TEMP\release\expanded" -Recurse -File -Filter "Microsoft.WindowsAppRuntime*.msix" |
            Where-Object FullName -Match "[\\/]Dependencies[\\/]x64[\\/]" |
            Select-Object -First 1
          if ($null -ne $dependency) { Add-AppxPackage -Path $dependency.FullName }
          $makeAppx = Get-ChildItem -LiteralPath "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory |
            Sort-Object Name -Descending |
            ForEach-Object { Get-Item -LiteralPath (Join-Path $_.FullName "x64\makeappx.exe") -ErrorAction SilentlyContinue } |
            Select-Object -First 1
          if ($null -eq $makeAppx) { throw "makeappx.exe was not found." }
          $loose = "$env:RUNNER_TEMP\release\loose"
          & $makeAppx.FullName unpack /p $msix.FullName /d $loose /o
          if ($LASTEXITCODE -ne 0) { throw "The beta package could not be unpacked." }
          Add-AppxPackage -Register (Join-Path $loose "AppxManifest.xml")

      - name: Run packaged smoke
        shell: pwsh
        run: .\scripts\test-packaged-smoke.ps1

      - name: Run packaged soak
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          TASKFLYOUT_SOAK_MINUTES: 10
          TASKFLYOUT_SOAK_MAX_HANDLE_GROWTH: 25
          TASKFLYOUT_SOAK_MAX_PRIVATE_MB_GROWTH: 64
        run: .\scripts\test-packaged-soak.ps1

      - name: Upload soak results
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: packaged-soak-${{ github.run_id }}
          path: TestResults/packaged-soak.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Remove test package
        if: always()
        shell: pwsh
        run: |
          Get-Process -Name "Task_Flyout" -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-AppxPackage -Name "Uranus92.TaskFlyout" | Remove-AppxPackage -ErrorAction SilentlyContinue
